name: Build Totka Quiz APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Fix Gradle Wrapper
        run: |
          chmod +x ./gradlew
          ./gradlew --version

      - name: Clean & Build Debug APK
        run: |
          ./gradlew clean
          ./gradlew assembleDebug --stacktrace --info | tail -n 150

      - name: 🔍 FULL APK SEARCH
        run: |
          echo "=== Root Directory ==="
          ls -la
          
          echo "=== Searching ALL APK files ==="
          find . -name "*.apk" -type f || echo "No .apk file found!"
          
          echo "=== Checking app module ==="
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "app/build folder not found"
          
          mkdir -p apk-output
          find . -name "*.apk" -exec cp -v {} apk-output/ \; 2>/dev/null || true
          
          echo "=== Final Output ==="
          ls -la apk-output/
          echo "Total APK found: $(ls apk-output/ | wc -l)"

      - name: 📦 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: totka-quiz-debug-apk
          path: apk-output/*.apk
          retention-days: 7
          if-no-files-found: warn
