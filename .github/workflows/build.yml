name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 📌 Grant execute permission
        run: chmod +x gradlew

      - name: 🔨 Clean & Build APK
        # প্রোজেক্ট পরিষ্কার করে নতুন করে বিল্ড করার জন্য clean assembleDebug দেওয়া হয়েছে
        run: ./gradlew clean assembleDebug --stacktrace --no-daemon

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TotkaQuiz-Debug
          # আপনার প্রোজেক্ট অনুযায়ী এটিই সঠিক পাথ
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
          if-no-files-found: error
          
