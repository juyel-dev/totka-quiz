name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Artifact
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 🛠️ Fix Wrapper Jar
        run: |
          mkdir -p gradle/wrapper
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            curl -L https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          fi
          chmod +x gradlew

      - name: 🔨 Build APK
        # assembleDebug কাজ না করলে এটি পুরো প্রোজেক্ট বিল্ড করবে
        run: ./gradlew assemble --stacktrace --no-daemon

      - name: 🔎 Find APK Path (Debug Only)
        run: find . -name "*.apk"

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: totka-quiz-app
          # এটি প্রোজেক্টের যেকোনো জায়গায় তৈরি হওয়া সব .apk ফাইল নিয়ে নেবে
          path: "**/*.apk"
          retention-days: 7
          if-no-files-found: error
          
