name: Ultimate Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Auto-Detect & Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🛠️ Auto-Fix and Build
        # এখানে আমরা ম্যানুয়ালি পাথ না লিখে অটো-ডিটেক্ট মোড ব্যবহার করছি
        run: |
          echo "Looking for gradlew..."
          # যেখানেই gradlew থাকুক খুঁজে বের করবে
          GRADLEW_FILE=$(find . -name "gradlew" | head -n 1)
          
          if [ -z "$GRADLEW_FILE" ]; then
            echo "❌ Error: gradlew file not found in the repository!"
            exit 1
          fi
          
          echo "✅ Found gradlew at: $GRADLEW_FILE"
          
          # ফাইল পারমিশন এবং ফরম্যাট ফিক্স
          chmod +x "$GRADLEW_FILE"
          sudo apt-get install -y dos2unix
          dos2unix "$GRADLEW_FILE"
          
          # বিল্ড শুরু
          echo "🚀 Starting Build..."
          "$GRADLEW_FILE" assembleDebug --no-daemon --stacktrace

      - name: 📤 Upload All Generated APKs
        uses: actions/upload-artifact@v4
        with:
          name: TotkaQuiz-Build
          # এটি যে কোনো ফোল্ডার থেকে .apk ফাইল তুলে আনবে
          path: "**/build/outputs/apk/debug/*.apk"
          if-no-files-found: error
          
