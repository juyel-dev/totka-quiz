name: Build Totka Quiz APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # ম্যানুয়ালি রান করার জন্য

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Make Gradle Executable
        run: chmod +x ./gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            \~/.gradle/caches
            \~/.gradle/wrapper
          key: \( {{ runner.os }}-gradle- \){{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # === ডায়াগনস্টিক (পাথ খুঁজে বের করার জন্য) ===
      - name: 🔍 Find APK Files
        run: |
          echo "=== সব APK খুঁজছি ==="
          find . -name "*.apk" -type f
          echo "=== APK আউটপুট ফোল্ডার ==="
          ls -la app/build/outputs/apk/debug/ || echo "debug ফোল্ডার পাওয়া যায়নি"
          mkdir -p apk-output
          cp app/build/outputs/apk/debug/*.apk apk-output/ 2>/dev/null || echo "কোন APK কপি হয়নি"

      - name: 📦 Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: totka-quiz-debug-apk
          path: apk-output/*.apk
          retention-days: 30
          if-no-files-found: warn

      # Release এ আপলোড (tag দিলে স্বয়ংক্রিয়ভাবে)
      - name: 📤 Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: apk-output/*.apk
          tag_name: latest
          name: Totka Quiz Latest APK
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
