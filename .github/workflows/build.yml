name: Final Pathless Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Auto-Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 🛠️ Fix and Build
        run: |
          # ১. gradlew ফাইলটি যেখানেই থাকুক খুঁজে বের করা
          G_PATH=$(find . -name "gradlew" | head -n 1)
          chmod +x "$G_PATH"
          sudo apt-get install -y dos2unix
          dos2unix "$G_PATH"
          
          # ২. অ্যাপ মডিউলসহ বিল্ড করা (যাতে কোনো পাথ মিস না হয়)
          "$G_PATH" :app:assembleDebug --no-daemon

      - name: 🔎 Deep Search and Copy
        # এটি ম্যাজিক স্টেপ: যেখানেই APK থাকুক, সেটিকে বের করে আনবে
        run: |
          mkdir -p final_output
          find . -name "*.apk" -type f -exec cp {} final_output/ \;
          echo "চেক করছি কোন ফাইল পাওয়া গেল কি না:"
          ls final_output/

      - name: 📤 Upload Found APKs
        uses: actions/upload-artifact@v4
        with:
          name: TotkaQuiz-Build
          # আমরা এখন আমাদের বানানো 'final_output' ফোল্ডার থেকে আপলোড করব
          path: final_output/
          
