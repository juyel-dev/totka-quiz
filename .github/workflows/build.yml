name: Build Android APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      
      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace
      
      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace
        continue-on-error: true
      
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
          ignore-errors: true

      - name: Print build output directory
        if: always()
        run: |
          echo "=== Debug APK Directory ==="
          ls -la app/build/outputs/apk/debug/ || echo "Debug directory not found"
          echo ""
          echo "=== Release APK Directory ==="
          ls -la app/build/outputs/apk/release/ || echo "Release directory not found"
