name: Real Solution Android Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Upload
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 📌 Grant execute permission
        run: chmod +x gradlew

      - name: 🔨 Clean & Build APK
        # clean যোগ করা হয়েছে যাতে পুরনো কোনো এরর ক্যাশ না থাকে
        run: ./gradlew clean assembleDebug --info

      - name: 📤 Upload Entire Outputs Folder (The Master Trick)
        uses: actions/upload-artifact@v4
        with:
          name: TotkaQuiz-Outputs
          # আমরা কোনো নির্দিষ্ট .apk খুঁজছি না, পুরো আউটপুট ফোল্ডার আপলোড করে দিচ্ছি
          path: app/build/outputs/
          
