      - name: 🛠️ Diagnostic Build
        run: |
          G_PATH=$(find . -name "gradlew" | head -n 1)
          chmod +x "$G_PATH"
          
          echo "--- ১. প্রজেক্টের আসল চেহারা (Directory Structure) ---"
          ls -R
          
          echo "--- ২. গ্র্যাডল কী কী করতে পারে (Available Tasks) ---"
          # এটি দেখাবে assembleDebug আদৌ আছে কি না
          "$G_PATH" tasks --all | grep assemble || echo "❌ No assemble task found!"
          
          echo "--- ৩. মেইন বিল্ড শুরু ---"
          # আমরা এবার কোনো মডিউল ( :app: ) উল্লেখ না করে সরাসরি রান করব
          "$G_PATH" assembleDebug --no-daemon --stacktrace --info
          
      - name: 🔎 Emergency Search
        run: |
          mkdir -p distribution
          echo "পুরো সার্ভারে APK খুঁজছি..."
          # যদি গ্র্যাডল সাকসেসফুল হয়, তবে সে কোথাও না কোথাও APK রাখবেই
          find . -name "*.apk" -exec cp {} ./distribution/ \;
          
          echo "ফলাফল:"
          ls -R distribution/
          
