name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Artifact
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          # setup-java এর নিজস্ব ক্যাশিং ফিচার ব্যবহার করা সহজ এবং কার্যকর
          cache: 'gradle'

      - name: 📌 Grant execute permission
        run: chmod +x gradlew

      - name: 🔨 Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7 # স্টোরেজ বাঁচাতে ৭ দিন রাখা বুদ্ধিমানের কাজ
          if-no-files-found: error
