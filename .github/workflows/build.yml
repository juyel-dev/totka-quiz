name: Final Build Fix

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 📌 Permission
        run: chmod +x gradlew

      - name: 🔨 Build with Force
        # এখানে শুধু assembleDebug এর বদলে assemble দেওয়া হয়েছে যাতে সব ভেরিয়েন্ট চেক হয়
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: 🔎 Locate APK File
        # এই কমান্ডটি চেক করবে আসলে APK কোথায় তৈরি হয়েছে
        run: |
          echo "Listing all APKs found:"
          find . -name "*.apk"
          # আসল ফাইলটিকে একটি নির্দিষ্ট জায়গায় কপি করে আনা
          mkdir -p output
          find app/build/outputs/apk/ -name "*.apk" -exec cp {} output/ \; || true

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TotkaQuiz-Build
          # আমরা এখন সরাসরি ওই আউটপুট ফোল্ডার থেকে ফাইল নেব
          path: output/*.apk
          retention-days: 7
          if-no-files-found: error
          
