- name: 🔎 Find and Prepare APK
        run: |
          echo "APK খুঁজছি..."
          find . -name "*.apk" -type f
          
          mkdir -p apk-output
          find . -name "*.apk" -exec cp {} apk-output/ \;
          
          echo "পাওয়া APK গুলো:"
          ls -la apk-output/

      - name: 📤 Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: apk-output/*.apk
          tag_name: latest
          name: "Totka Quiz Latest Build"
          draft: false
          prerelease: false
