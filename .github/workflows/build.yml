name: Brute Force Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Force Finding Path
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🔍 Brute Force Directory Search
        # এই স্টেপটি সার্ভারের সব ফাইল এবং ফোল্ডার প্রিন্ট করবে
        # যাতে আমরা দেখতে পাই 'app' ফোল্ডারটি আসলে কোথায়
        run: |
          echo "Current Path: $(pwd)"
          echo "--- Root Files ---"
          ls -F
          echo "--- Full Tree Search ---"
          find . -maxdepth 3 -not -path '*/.*'

      - name: 📌 Fix Permissions & Line Endings
        # gradlew ফাইলটি যেখানেই থাকুক, খুঁজে বের করে পারমিশন দেবে
        run: |
          find . -name "gradlew" -exec chmod +x {} \;
          find . -name "gradlew" -exec sudo apt-get install dos2unix -y && dos2unix {} \;

      - name: 🔨 Force Build (Ignore Errors for now)
        # এটি যে কোনো ডিরেক্টরিতে gradlew থাকলে সেটা রান করার চেষ্টা করবে
        run: |
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          if [ -z "$GRADLEW_PATH" ]; then
            echo "❌ gradlew খুঁজে পাওয়া যায়নি!"
            exit 1
          fi
          $GRADLEW_PATH assembleDebug --no-daemon --stacktrace

      - name: 📤 Brute Force APK Upload
        uses: actions/upload-artifact@v4
        with:
          name: TotkaQuiz-BruteForce
          # এই পাথটি পুরো প্রোজেক্টের সব APK খুঁজে বের করবে
          path: "**/build/outputs/apk/debug/*.apk"
          if-no-files-found: error
          
